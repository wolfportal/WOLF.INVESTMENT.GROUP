        markEditable();
        initChromeUI();

ka:{title:'შალეების კატალოგი',subtitle:'ძვირადღირებული უძრავი ქონება ცხოვრებისა და ინვესტიციისთვის',rights:'ყველა უფლება დაცულია © 2026',chalet:'შალე',resort:'კურორტი',location:'იერიხოს კარიბჭე',land:'მიწა',build:'აშენებული ფართობი',rooms:'ოთახები',master:'მასტერი',pool:'აუზი',delivery:'ჩაბარება',instant:'დაუყოვნებლივ',cash:'ნაღდი',installment:'განვადება',first:'პირველი შენატანი: ₪1,000,000 | 15 თვე',discount:'ბაზრის ფასზე ₪700,000-ით ნაკლები',back:'ორმაგი ტიპი',standalone:'ცალკე მდგომი',resortType:'კერძო კურორტი',video:'▶ ვიდეო',whatsapp:'WhatsApp',details:'მეტი დეტალი',hide:'დამალვა',modern:'თანამედროვე შალე საცხოვრებლად ან ტურისტული ინვესტიციისთვის იერიხოს კარიბჭეში.\n\nღია გეგმარება მაღალი ხარისხის მოპირკეთებით, ფართო გარე სივრცე დასასვენებელი სკამებითა და გარე ბილიარდის მაგიდით, ასევე 4×8 აუზი მშვიდი ხედით.\n\nიდეალურია პატარა ოჯახებისთვის ან მაღალი შემოსავლის მქონე ტურისტული გაქირავებისთვის.',practical:'შესანიშნავი შესაძლებლობა თანამედროვე და პრაქტიკული შალეს შესაძენად იერიხოს კარიბჭეში.\n\nშიდა სივრცე: 3 საძინებელი, მასტერ-საძინებელი პირადი სააბაზანოთი და ორი ერთადგილიანი საძინებელი საერთო სააბაზანოთი. ყველა საძინებელი აუზს გადაჰყურებს. შიდა სამზარეულო ღია დასასვენებელი სივრცითა და აუზის პირდაპირი ხედით.\n\nაუზი: 4×9 მ, ქლორის სისტემა, ოთხმხრივი overflow.\n\nინფრასტრუქტურა: კერძო ავტოფარეხი და გარე დანართი სამზარეულოთი, სათავსოთი და სააბაზანოთი.',single:'ერთსართულიანი შალე პრაქტიკული დიზაინითა და კომფორტული სივრცეებით.\n\nშიდა სივრცე: 3 მასტერ-საძინებელი, საერთო სააბაზანო, დასასვენებელი ზონა, მზა ღია სამზარეულო და გარე ავტოფარეხი.\n\nგარე სივრცე: 10×5 მ აუზი, გარე სააბაზანო, სათავსო, მწვადის ზონა და დასასვენებელი ადგილები.',luxury:'ძვირადღირებული შალე სუპერ-დელუქს მოპირკეთებითა და საერთაშორისო სტანდარტებით, ცალკე მდგომი ერთსართულიანი შენობა.\n\nშიდა სივრცე: 3 მასტერ-საძინებელი აუზის ხედით, ფართო მისაღები, თანამედროვე შიდა სამზარეულო და გარე სამზარეულო გრილითა და ტაბუნის ღუმელით.\n\nკონდიცირება: Mitsubishi VRF ცენტრალური სისტემა. Smart: სრული კონტროლი ტელეფონიდან, აუდიო სისტემა და კამერები.\n\nგარე სივრცე: 5×10 აუზი, 3×3 ჯაკუზი, ავტომატური მორწყვის ბაღი და 3.5 მ ალუმინის ავტოფარეხი. სრული კონფიდენციალურობა.',investment:'გამორჩეული საინვესტიციო შესაძლებლობა: კერძო კურორტი 5 დამოუკიდებელი შალეთი, ბაზრის ფასზე ₪700,000-ით ნაკლები.\n\nთითოეული შალე მოიცავს ერთადგილიან საძინებელს, მასტერ-საძინებელს, სააბაზანოს, ავეჯს, სამზარეულოსა და ცენტრალურ კონდიცირებას.\n\n100 მ²-იანი შეკრების ქოხი, დახურული 6×12 overflow აუზი, ჯაკუზი, პალმების ბაღები, მზის ენერგიის ინფრასტრუქტურა, 15 კუბური მეტრის მიწისქვეშა ავზი და ცალკე რეგისტრირებული ბინები. სრული კონფიდენციალურობა.'}};
let lang='ar';
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function card(p,i){const t=T[lang], type=t[p.type==='resort'?'resortType':p.type], name=t[p.name], desc=t[p.desc];let media=p.vid?`<div class="slide"><video src="${p.vid}" controls playsinline preload="metadata" poster="${p.images[0]||''}"></video></div>`:'';media+=p.images.map((x,j)=>`<div class="slide"><img src="${x}" alt="${p.id} ${j+1}"></div>`).join('');const specs=[['land',t.land,p.land,'land'],['build',t.build,p.build,'build']];if(p.rooms)specs.push(['rooms',t.rooms,p.rooms+(p.id==='Sal-I35'?' (2 '+(lang==='ar'?'لكل شاليه':lang==='en'?'per chalet':lang==='he'?'לכל בקתה':'თითოეულ შალეზე')+')':''),'bed']);if(p.master)specs.push(['master',t.master,p.master,'bed']);specs.push(['pool',t.pool,p.pool,'pool'],['delivery',t.delivery+':',t.instant,'done']);return `<article class="property-card"><div class="property-image ${media?'has-slides':''}" data-slider><div class="slides">${media||'<div class="slide"></div>'}</div><button class="slider-btn prev" onclick="moveSlide(this,-1)">‹</button><button class="slider-btn next" onclick="moveSlide(this,1)">›</button><div class="slider-dots"></div><span class="badge">${p.id}</span><span class="type-badge">${type}</span>${p.vid?`<span class="video-badge">${t.video}</span>`:''}</div><div class="property-details"><h2 class="property-title">${name} <span>#${p.id}</span></h2><div class="location">${icon.loc}${t.location}</div><div class="property-specs">${specs.map(s=>`<div class="spec-item">${icon[s[3]]}<span>${s[1]}: <strong>${s[2]}</strong></span></div>`).join('')}</div><div class="divider"></div><div class="property-payment"><span class="payment-tag ${p.pay}">${t[p.pay]}</span>${p.pay==='installment'?`<span class="payment-info">${t.first}</span>`:''}${p.discount?`<span class="payment-info">${t.discount}</span>`:''}</div><div class="property-desc" id="desc-${i}">${esc(desc).replace(/\n/g,'<br><br>')}</div><div class="property-actions"><a href="${wa}${encodeURIComponent((lang==='ar'?'مرحبا، أريد الاستفسار عن ':lang==='en'?'Hello, I would like information about ':lang==='he'?'שלום, ברצוני לברר לגבי ':'გამარჯობა, მსურს ინფორმაციის მიღება ') + name+' '+p.id)}" target="_blank" class="btn btn-whatsapp">${icon.wa}${t.whatsapp}</a><button class="btn btn-details" onclick="toggleDesc(${i},this)">${t.details}</button></div></div></article>`}
function render(){const t=T[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'||lang==='he'?'rtl':'ltr';document.body.classList.toggle('latin',lang!=='ar'&&lang!=='he');document.querySelector('[data-i18n=title]').textContent=t.title;document.querySelector('[data-i18n=subtitle]').textContent=t.subtitle;document.querySelector('[data-i18n=rights]').textContent=t.rights;document.getElementById('catalog').innerHTML=data.map(card).join('');document.querySelectorAll('[data-slider]').forEach(initSlider);document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang))}
function toggleDesc(i,b){const d=document.getElementById('desc-'+i),t=T[lang];d.classList.toggle('show');b.textContent=d.classList.contains('show')?t.hide:t.details}
function moveSlide(btn,dir){const c=btn.closest('[data-slider]'),s=c.querySelector('.slides'),n=s.children.length;if(n<=1)return;let cur=+(c.dataset.current||0);cur=(cur+dir+n)%n;s.style.transform=`translateX(${cur*100}%)`;c.dataset.current=cur;c.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));s.querySelectorAll('video').forEach(v=>v.pause())}
function initSlider(c){const n=c.querySelector('.slides').children.length;if(n<=1)return;const dots=c.querySelector('.slider-dots');for(let i=0;i<n;i++){const d=document.createElement('span');d.className='dot'+(!i?' active':'');d.onclick=()=>{const s=c.querySelector('.slides');s.style.transform=`translateX(${i*100}%)`;c.dataset.current=i;c.querySelectorAll('.dot').forEach((x,j)=>x.classList.toggle('active',i===j));s.querySelectorAll('video').forEach(v=>v.pause())};dots.appendChild(d)}}
document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;render()});render();
</script>
